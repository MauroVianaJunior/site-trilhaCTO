<!DOCTYPE html>
<html>
<head>
    <title>Meu Primeiro Site</title>
    <style>
        body {
            background-color: lightblue;
            text-align: center;
        }
        h1 {
            color: darkblue;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Meu nome é MAURO e estou aprendendo programação.</p>
    <img src="https://www.mackenzie.br/fileadmin/ARQUIVOS/Public/4-colegios/brasilia/2025/News-Noticias/News001_RegrasUsoCelular/News001-RegraUsoCelular.jpeg" width="200">
    <p>
        <button onclick="mensagem()">Clique aqui</button>
    </p>
    <p>
        <button onclick="mudaCor()">Muda a cor</button>
    </p>
    <script>
        function mensagem() {
            alert("Olá, programador! Você clicou no botão!");
        }
        function mudaCor(){
            document.body.style.background = "yellow";
        }
    </script>        
</body>
</html>
