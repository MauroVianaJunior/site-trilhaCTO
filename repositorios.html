<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Repositórios</title>
  <style>

    body {
        font-family: Arial, sans-serif;
        background-color: #eeeeee;
        margin: 0;
    } 
    
    .container {
        width: 800px;
        margin: 40px auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        position: relative;
    }
    
    h1 {
        text-align: center;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        table-layout: fixed;
    }
    
    th, td {
        border-bottom: 1px solid #ddd;
        padding: 12px;
    }
    
    th {
        background-color: #f5f5f5;
    }
    
    td:last-child {
        text-align: center;
    }

    td{
      background: white;
      white-space: nowrap;
    }

    td:first-child, th:first-child {
      width: 80%;
    }

    td:last-child, th:last-child {
      width: 20%;
    }
    
    .repo img {
        width: 30px;
        background-color: white;
        padding: 4px;
        border-radius: 4px;
    }    
    
    .repo img:hover {
        transform: scale(1.25);
    }

   .botao-voltar {
      background-color: #4a6fa5;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      font-family: Arial, sans-serif;
      display: inline-block;
  }

  /* efeito ao passar o mouse */
  .botao-voltar:hover {
      background-color: #365785;
  }

  /* botão de cima */
  .topo {
      position: absolute;
      top: 20px;
      right: 20px;
  }
  
  /* botão de baixo */
  .baixo {
      display: block;
      width: fit-content;
      margin-left: auto;
      margin-top: 20px;
  }
    
  </style>
</head>
<body>
  <div class="container">
    
    <a href="index.html" class="botao-voltar topo">Voltar</a>
    
    <h1>1ª Série</h1>  
    <table>  
      
      <tr>
        <th>Estudantes</th>
        <th>Repositório</th>
      </tr>  
      
      <tr>
        <td>Nome do estudante</td>
        <td class="repo">
            <a href="#">
              <img src="./images/github.png">
            </a>
        </td>
      </tr>  
    </table>

    <h1>2ª Série</h1>  
    <table>     
      <tr>
        <th>Estudantes</th>
        <th>Repositório</th>
      </tr>      
      <tr>
        <td>BIANCA LODDER e BEATRIZ GONÇALVES</td>
        <td class="repo">
            <a href="https://biascandi.github.io/site-2serie-BeatrizBianca/" target="_blank">
              <img src="./images/github.png">
            </a>
        </td>
      </tr>  
      <tr>
        <td>CLARICE PINHEIRO e ENZO CAMPOS</td>
        <td class="repo">
          <a href="https://enzo-princivalli.github.io/site-2serie-EnzoeClarice/" target="_blank">
            <img src="./images/github.png">
          </a>
        </td>
      </tr>  
      <tr>
        <td>GABRIELA PELLEGRINI e PAOLA ALVARENGA</td>
        <td class="repo">
          <a href="https://gabithehackergirl.github.io/Site-2B-GabrielaM-PaolaG./" target="_blank">
            <img src="./images/github.png">
          </a>
        </td>
      </tr>  
    </table>

    <h1>3ª Série</h1>  
    <table>      
      <tr>
        <th>Estudantes</th>
        <th>Repositório</th>
      </tr>  
      <tr>
        <td>Nome do estudante</td>
        <td class="repo">
          <a href="#">
            <img src="./images/github.png">
          </a>
        </td>
      </tr>  
    </table>
    <a href="index.html" class="botao-voltar baixo">Voltar</a>
  </div>
</body>
</html>
