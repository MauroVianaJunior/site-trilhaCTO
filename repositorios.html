<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Repositórios</title>
  <style>

    body {
        font-family: Arial, sans-serif;
        background-color: #eeeeee;
        margin: 0;
    }
    
    .container {
        width: 800px;
        margin: 40px auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
    }
    
    h1 {
        text-align: center;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }
    
    th, td {
        border-bottom: 1px solid #ddd;
        padding: 12px;
    }
    
    th {
        background-color: #f5f5f5;
    }
    
    td:last-child {
        text-align: center;
    }
    
    .repo img {
        width: 28px;
    }
    
    .repo img:hover {
        transform: scale(1.15);
    }
    
  </style>
</head>
<body>
  <div class="container">  
    <h1>2ª Série</h1>  
    <table>  
      
      <tr>
        <th>Estudante</th>
        <th>Repositório</th>
      </tr>  
      
      <tr>
        <td>Nome do estudante</td>
        <td class="repo">
            <a href="#">
              <img src="github.png">
            </a>
        </td>
      </tr>
  
      <tr>
        <td>Nome do estudante</td>
        <td class="repo">
          <a href="#">
            <img src="github.png">
          </a>
        </td>
      </tr>
  
      <tr>
        <td>Nome do estudante</td>
        <td class="repo">
          <a href="#">
            <img src="github.png">
          </a>
        </td>
      </tr>
  
    </table>
  </div>
</body>
</html>
